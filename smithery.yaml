# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      multichainLicenseKey:
        type: string
        description: >-
          Optional Lemon Squeezy license key. Omit to run on the Free tier
          (get_balance, get_prices). Unlocks get_portfolio and
          prepare_transfer on Pro, plus deploy_token on Team.
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@wkalidev/multichain-mcp'],
      env: config.multichainLicenseKey ? { MULTICHAIN_LICENSE_KEY: config.multichainLicenseKey } : {}
    })
